name: Automated CI Build
# This workflow runs automatically for every commit on GitHub to check syntax and build the frontend.
on:
  workflow_call:
    inputs:
      branchName:
        required: false
        type: string
        default: 'develop'

jobs:
  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull openIMIS Frontend
        env:
          # Pass attacker-controllable inputs through env vars rather than
          # interpolating into the shell directly. Prevents command injection
          # if a branch ref contains shell metacharacters.
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Determine the source and target branches
          if [ "$EVENT_NAME" == "pull_request" ]; then
            SOURCE_BRANCH="$PR_HEAD_REF"
            TARGET_BRANCH="$PR_BASE_REF"
          else
            SOURCE_BRANCH="$REF_NAME"
            TARGET_BRANCH="develop"
          fi

          # Use 'develop' as fallback if SOURCE_BRANCH or TARGET_BRANCH is empty
          SOURCE_BRANCH="${SOURCE_BRANCH:-develop}"
          TARGET_BRANCH="${TARGET_BRANCH:-develop}"

          echo "Source branch: $SOURCE_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

          # Clone the repository with source branch, fall back to target branch if source doesn't exist.
          # `grep -F` treats $SOURCE_BRANCH as a literal string (not a regex), avoiding false positives
          # if a branch name contains regex metacharacters.
          rm -rf ./openimis-fe
          if git ls-remote --heads https://github.com/openimis/openimis-fe_js.git "$SOURCE_BRANCH" | grep -qF "$SOURCE_BRANCH"; then
            echo "Cloning source branch: $SOURCE_BRANCH"
            git clone --depth=1 --branch="$SOURCE_BRANCH" https://github.com/openimis/openimis-fe_js.git ./openimis-fe
          else
            echo "Source branch $SOURCE_BRANCH not found, falling back to $TARGET_BRANCH"
            git clone --depth=1 --branch="$TARGET_BRANCH" https://github.com/openimis/openimis-fe_js.git ./openimis-fe || {
              echo "Failed to clone $TARGET_BRANCH, falling back to develop"
              git clone --depth=1 --branch=develop https://github.com/openimis/openimis-fe_js.git ./openimis-fe
            }
          fi

          # Verify the cloned branch
          cd ./openimis-fe
          CLONED_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Cloned branch: $CLONED_BRANCH"
      - name: Copy Current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: './current-module'

      - name: Install current module's devDeps
        working-directory: ./current-module
        run: |
          # Install the module's own devDeps (notably vite) so its
          # `prepare: vite build` works when the host installs it as a
          # `file:` dep later. --ignore-scripts here prevents prepare from
          # running prematurely (vite isn't on PATH yet at this point);
          # the explicit host install at "Install dependencies" below will
          # trigger prepare with vite available.
          npm install --legacy-peer-deps --ignore-scripts

      - name: Update the configuration
        working-directory: ./openimis-fe
        run: |
          sudo apt-get update
          sudo apt-get install jq
          PACKAGE_NAME=$(jq -r '.name' ../current-module/package.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          export MODULE_NAME=$(grep -oP 'export\s+(?:const)?\s+\K\w+Module(?=\s+=)' ../current-module/src/index.js)
          echo "MODULE_NAME=$MODULE_NAME" >> $GITHUB_ENV
          
          # Add or replace MODULE_NAME module in openimis.json (local version)
          jq --arg name "$MODULE_NAME" --arg npm_val "$PACKAGE_NAME@file:../current-module" 'if [.modules[].name == $name] | max then (.modules[] | select(.name == $name) | .npm) = $npm_val else .modules |= . + [{name: $name, npm: $npm_val}] end' openimis.json > temp.json && mv temp.json openimis.json

      - name: Check package.json
        working-directory: ./openimis-fe
        run: |
          npm run check-package
          # install without openimis modules
          npm install --include=dev --legacy-peer-deps

      - name: Prepare openIMIS Dependencies
        working-directory: ./openimis-fe
        run: npm run load-config

      - name: Install dependencies
        working-directory: ./openimis-fe
        run: npm install --include=dev --legacy-peer-deps

      - name: Build
        working-directory: ./openimis-fe
        run: npm run build
