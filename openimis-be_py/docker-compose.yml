services:
  db:
    container_name: ${PROJECT_NAME:-openimis}-db
    image: ghcr.io/openimis/openimis-pgsql:${DB_TAG:-develop}
    environment:
      - POSTGRES_PASSWORD=$PSQL_DB_PASSWORD
      - POSTGRES_DB=$PSQL_DB_NAME
      - POSTGRES_USER=$PSQL_DB_USER
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', "$PSQL_DB_USER", '-d', "test_imis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database:/var/lib/postgresql/data
    restart: always
    ports:
      - 5432:5432

  rabbitmq:
    container_name: ${PROJECT_NAME:-openimis}-rabbitmq
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - 5672:5672
      - 15672:15672

  backend:
    container_name: ${PROJECT_NAME:-openimis}-backend
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=openIMIS.settings
      - PSQL_DB_HOST=db
      - CELERY_BROKER_URL=amqp://rabbitmq:5672
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount hospital_payment module for editable install inside container.
      # The path /openimis-be/openimis-be-hospital_payment_py matches what
      # openimis.json's "-e ../openimis-be-hospital_payment_py" resolves to
      # when pip runs from /openimis-be/script/.
      - ../openimis-be-hospital_payment_py:/openimis-be/openimis-be-hospital_payment_py
      # Pip cache for faster module reinstalls
      - pip-cache:/pip-cache
    entrypoint: []
    command: >
      bash -c "cd /openimis-be/script &&
        python modules-requirements.py ../openimis.json > modules-requirements.txt &&
        pip install --cache-dir /pip-cache -r modules-requirements.txt &&
        cd /openimis-be/openIMIS &&
        python manage.py migrate --no-input &&
        python server.py"
    restart: always

  worker:
    container_name: ${PROJECT_NAME:-openimis}-worker
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=openIMIS.settings
      - PSQL_DB_HOST=db
      - CELERY_BROKER_URL=amqp://rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ../openimis-be-hospital_payment_py:/openimis-be/openimis-be-hospital_payment_py
      - pip-cache:/pip-cache
    entrypoint: []
    command: >
      bash -c "cd /openimis-be/script &&
        python modules-requirements.py ../openimis.json > modules-requirements.txt &&
        pip install --cache-dir /pip-cache -r modules-requirements.txt &&
        cd /openimis-be/openIMIS &&
        celery -A openIMIS worker --loglevel=INFO"
    restart: always

