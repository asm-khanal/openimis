name: create manual docker image 
on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
      build_mode:
        description: 'Build mode (prod for minified, dev for unminified)'
        required: false
        default: 'prod'
        type: choice
        options:
        - prod
        - dev
      file_url:
        description: 'url (CURL compatible) of your custom openIMIS.json'
        required: false
jobs:
  publish-manual-docker-image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Download custom openimis.json
      if: ${{ inputs.file_url != '' }}
      run: |
          curl -o ./openimis.json ${{ inputs.file_url }}
    - name: Set build mode
      run: |
        if [ "${{ github.event.inputs.build_mode }}" = "dev" ]; then
          echo "MODE=development" >> $GITHUB_ENV
        else
          echo "MODE=production" >> $GITHUB_ENV
        fi
    - name: Build the openimis frontend Docker image
      run: |
         docker build . --no-cache --build-arg MODE=$MODE --tag ghcr.io/openimis/openimis-fe:${{ github.event.inputs.tag }}
         docker push ghcr.io/openimis/openimis-fe:${{ github.event.inputs.tag }}
